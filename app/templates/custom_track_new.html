{% extends "base.html" %}

{% block content %}

<style>
.container {
    max-width: 950px;
    margin: auto;
    padding: 40px;
}

.form-box {
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

.field {
    margin-bottom: 22px;
}

label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
}

input[type="text"],
textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    box-sizing: border-box;
}

.verse-list {
    max-height: 420px;
    overflow-y: auto;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 16px;
}

.verse-item {
    padding: 10px 0;
    border-bottom: 1px solid #f1f5f9;
}

.verse-item:last-child {
    border-bottom: none;
}

.verse-item label {
    font-weight: 400;
    margin: 0;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #2a6df4;
    color: white;
    font-weight: 600;
    cursor: pointer;
}
</style>

<div class="container">
    <h1>Nova Trilha Personalizada</h1>

    <form method="post" class="form-box">
        <div class="field">
            <label for="title">Nome da trilha</label>
            <input id="title" type="text" name="title" required>
        </div>

        <div class="field">
            <label for="description">Descrição</label>
            <textarea id="description" name="description" rows="3"></textarea>
        </div>

        <div class="field">
            <label>Escolha os versículos</label>
            <div class="verse-list">
                {% for verse in verses %}
                <div class="verse-item">
                    <label>
                        <input type="checkbox" name="verse_ids" value="{{ verse.id }}">
                        <strong>{{ verse.reference }}</strong> — {{ verse.text }}
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>

        <button type="submit">Criar trilha</button>
    </form>
</div>

{% endblock %}
