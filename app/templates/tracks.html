{% extends "base.html" %}

{% block content %}

<style>

.container{
    max-width:1100px;
    margin:auto;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:0.7;
    margin-bottom:40px;
}

.tracks-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

.track{
    background:white;
    padding:22px;
    border-radius:16px;
    box-shadow:0 2px 12px rgba(0,0,0,0.05);
    transition:.2s;
}

.track:hover{
    transform:translateY(-3px);
}

.track h3{
    margin-top:0;
}

.track p{
    color:#475569;
}

.track-seteceb{
    background:#6b0f1a;
    border:2px solid #6b0f1a;
}

.track-seteceb h3,
.track-seteceb p{
    color:white;
}

.track-seteceb a{
    color:white;
}

a{
    color:#2a6df4;
    text-decoration:none;
    font-weight:600;
}

</style>

<div class="container">

    <h1>Trilhas de Memorização</h1>

    <div class="subtitle">
        Escolha uma trilha e comece a memorizar a Palavra de Deus
    </div>

    <div class="tracks-grid">

        {% for track in tracks %}

        <div class="track {% if track.title == 'Seteceb 1º 2026' %}track-seteceb{% endif %}">

            <h3>{{ track.title }}</h3>

            <p>{{ track.description }}</p>

            <a href="/trilha/{{ track.id }}">
                Abrir trilha →
            </a>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
