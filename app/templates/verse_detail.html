{% extends "base.html" %}

{% block content %}

<style>
    .verse-container {
        max-width: 800px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .verse-box {
        background: white;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        margin-bottom: 30px;
    }

    .verse-reference {
        font-weight: 600;
        margin-bottom: 20px;
        font-size: 18px;
    }

    .verse-text {
        font-size: 22px;
        line-height: 1.8;
    }

    .controls {
        margin-top: 30px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
    }

    .btn {
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        border: none;
        cursor: pointer;
        font-size: 15px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .btn-primary {
        background: #4CAF50;
        color: white;
    }

    .btn-secondary {
        background: #eeeeee;
        color: #222;
    }

    .hidden-word {
        background: #dcdcdc;
        color: transparent;
        border-radius: 4px;
        padding: 2px 4px;
    }

    .back-link {
        display: inline-block;
        margin-bottom: 18px;
        text-decoration: none;
    }

    .status-line {
        margin-top: 24px;
    }

    .audio-player {
        margin-top: 20px;
        width: 100%;
    }
</style>

<div class="verse-container">
    <a href="/trilha/{{ verse.track.id }}" class="back-link">← Voltar à trilha</a>

    <div class="verse-box">
        <div class="verse-reference">
            {{ verse.reference }}
        </div>

        <div class="verse-text" id="verseText">
            {{ verse.text }}
        </div>

        <p class="status-line">
            <strong>Status:</strong>
            {% if progress.memorized %}
                Memorizado
            {% else %}
                Em andamento
            {% endif %}
        </p>

        <div class="controls">
            <button type="button" class="btn btn-secondary" onclick="tocarAudioVersiculo()">
                Ouvir áudio
            </button>

            <button type="button" class="btn btn-secondary" onclick="pararAudio()">
                Parar áudio
            </button>

            <button type="button" class="btn btn-secondary" onclick="hideWords()">
                Esconder palavras
            </button>

            {% if not progress.memorized %}
            <form method="post" action="/versiculo/{{ verse.id }}/memorizar" style="margin: 0;">
                <button type="submit" class="btn btn-primary">
                    Marcar como memorizado
                </button>
            </form>
            {% else %}
            <span class="btn btn-primary" style="opacity: 0.8; cursor: default;">
                Versículo memorizado
            </span>
            {% endif %}
        </div>

        <audio id="verseAudio" class="audio-player" controls preload="none">
            <source src="/versiculo/{{ verse.id }}/audio" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>
    </div>
</div>

<script>
    function tocarAudioVersiculo() {
        const audio = document.getElementById("verseAudio");
        audio.currentTime = 0;
        audio.play();
    }

    function pararAudio() {
        const audio = document.getElementById("verseAudio");
        audio.pause();
        audio.currentTime = 0;
    }

    function hideWords() {
        const verse = document.getElementById("verseText");
        const words = verse.innerText.split(" ");

        const hidden = words.map(function(word) {
            if (Math.random() < 0.35) {
                return '<span class="hidden-word">' + word + '</span>';
            }
            return word;
        });

        verse.innerHTML = hidden.join(" ");
    }
</script>

{% endblock %}
